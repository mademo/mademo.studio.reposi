# Mademo Studio — Configuration Nginx pour Local by Flywheel
# 
# Dans Local : clic droit sur le site → "Open site folder"
# Placer ce fichier dans : conf/nginx/site.conf
# Puis redémarrer le site dans Local

server {
    listen 80;
    server_name localhost;
    root /app/public;
    index index.php;

    # Charset
    charset utf-8;

    # Compression gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml font/woff2;
    gzip_min_length 1024;

    # Cache assets Vite hashés (nom contient un hash)
    location ~* /wp-content/themes/mademo/dist/assets/.*\.[0-9a-f]{8,}\.(js|css|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Assets WordPress statiques
    location ~* \.(js|css|png|jpg|jpeg|gif|webp|ico|svg|woff2|woff|ttf)$ {
        expires 3M;
        add_header Cache-Control "public, max-age=7776000";
        try_files $uri =404;
        log_not_found off;
    }

    # Bloquer l'accès aux fichiers sensibles
    location ~* \.(env|git|htaccess|htpasswd)$ {
        deny all;
    }

    # Bloquer PHP dans uploads
    location ~* /wp-content/uploads/.*\.php {
        deny all;
    }

    # API REST WordPress — passer à PHP directement
    location /wp-json/ {
        try_files $uri $uri/ /index.php?$args;
    }

    # Admin WordPress
    location /wp-admin/ {
        try_files $uri $uri/ /index.php?$args;
    }

    # Fichiers système WordPress
    location ~* ^/wp-(login|signup|cron|activate|mail|comments-post)\.php$ {
        try_files $uri =404;
        fastcgi_pass unix:/var/run/php-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # SPA React — toutes les autres URLs passent par WordPress (index.php)
    # WordPress détecte la page et renvoie la SPA via template_include
    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # PHP via PHP-FPM
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass unix:/var/run/php-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PHP_VALUE "upload_max_filesize=64M \n post_max_size=64M";
        include fastcgi_params;
        fastcgi_read_timeout 300;
    }
}
